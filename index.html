<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Guard Hedge</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F0F4F8;
      --navy: #0D2340;
      --white: #FFFFFF;
      --text-muted: #7A8FA6;
    }

    html, body {
      height: 100%;
      background-color: var(--bg);
      font-family: 'Lato', sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      opacity: 0;
      animation: fadeIn 1.4s ease forwards;
      animation-delay: 0.3s;
    }

    .logo-wrapper {
      width: 200px;
      height: 200px;
      background-color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      box-shadow: 0 8px 40px rgba(13, 35, 64, 0.18);
    }

    .logo-inner {
      width: 100%;
      height: 100%;
      background-color: var(--navy);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-text {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-weight: 700;
      font-size: 15px;
      color: var(--white);
      letter-spacing: 0.1em;
      text-align: center;
      line-height: 1.3;
      padding: 0 12px;
    }

    .tagline {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 11.5px;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-align: center;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-wrapper">
      <div class="logo-inner">
        <span class="logo-text">GUARD HEDGE</span>
      </div>
    </div>
    <p class="tagline">The future of hedge funds is taking shape right now, just be patient!</p>
  </div>
</body>
</html>
