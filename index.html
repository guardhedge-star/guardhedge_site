<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Guard Hedge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Raleway:wght@300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body {
      background-color: #e8eaef;
      display: flex;
      flex-direction: column;
      /* Centrage parfait sur la page */
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      /* L'animation s'applique maintenant directement au texte restant */
      animation: rise 1.6s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .tagline-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      animation: fadeUp 2.2s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .divider {
      width: 28px;
      height: 1px;
      background: #8a93a8;
      opacity: 0.4;
    }
    .tagline {
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
      font-size: 9.5px;
      letter-spacing: 0.3em;
      color: #8a93a8;
      text-align: center;
      text-transform: uppercase;
      line-height: 2;
      max-width: 380px;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="tagline-block">
      <div class="divider"></div>
      <p class="tagline">
        The future of hedge funds is taking shape right now,<br>just be patient.
      </p>
    </div>

  </div>
</body>
</html>
